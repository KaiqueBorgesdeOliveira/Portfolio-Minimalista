<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Fundo com paleta Ubuntu -->
  <defs>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#77216F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base arredondada com gradiente Ubuntu -->
  <rect width="64" height="64" rx="12" fill="url(#hardwareGrad)"/>
  
  <!-- Linhas de circuito/hardware decorativas -->
  <line x1="8" y1="8" x2="20" y2="8" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="8" x2="20" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  
  <line x1="56" y1="48" x2="44" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="48" x2="44" y2="56" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Letra K estilizada em branco -->
  <text x="32" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#fff" dy="-0.1em">K</text>
</svg> 